openapi: 3.1.0
info:
  title: API Gestión de Solicitudes Académicas
  version: 1.0.0
  description: Servicios REST para manejar solicitudes, usuarios, historial y funcionalidades de IA.

servers:
  - url: http://localhost:8080/api

paths:

  # ==================== AUTENTICACIÓN ====================
  /auth/login:
    post:
      summary: Autenticación de usuario
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token JWT generado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Datos de entrada inválidos
        '401':
          description: Credenciales incorrectas

  # ==================== GESTIÓN DE USUARIOS ====================
  /usuarios:
    post:
      summary: Crear nuevo usuario
      operationId: crearUsuario
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearUsuarioDTO'
      responses:
        '201':
          description: Usuario creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioDTO'
        '400':
          description: Datos inválidos (correo duplicado, formato incorrecto)
        '401':
          description: No autenticado
        '403':
          description: No autorizado - Solo ADMINISTRATIVO puede crear usuarios

    get:
      summary: Listar usuarios con filtros
      operationId: listarUsuarios
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: rol
          schema:
            $ref: '#/components/schemas/Rol'
          description: Filtrar por rol del usuario
        - in: query
          name: activo
          schema:
            type: boolean
          description: Filtrar por estado activo/inactivo
        - in: query
          name: search
          schema:
            type: string
          description: Búsqueda por nombre o correo (búsqueda parcial)
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsuarioDTO'
        '401':
          description: No autenticado

  /usuarios/{id}:
    get:
      summary: Obtener usuario por ID
      operationId: obtenerUsuario
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID del usuario
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioDTO'
        '401':
          description: No autenticado
        '404':
          description: Usuario no encontrado

    put:
      summary: Actualizar usuario
      operationId: actualizarUsuario
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID del usuario a actualizar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActualizarUsuarioDTO'
      responses:
        '200':
          description: Usuario actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioDTO'
        '400':
          description: Datos inválidos
        '401':
          description: No autenticado
        '403':
          description: No autorizado para modificar este usuario
        '404':
          description: Usuario no encontrado

    delete:
      summary: Eliminar (desactivar) usuario
      operationId: eliminarUsuario
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID del usuario a desactivar
      responses:
        '204':
          description: Usuario desactivado correctamente
        '401':
          description: No autenticado
        '403':
          description: No autorizado para eliminar usuarios
        '404':
          description: Usuario no encontrado

  # ==================== GESTIÓN DE SOLICITUDES ====================
  /solicitudes:
    post:
      summary: Registrar nueva solicitud
      operationId: registrarSolicitud
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearSolicitudDTO'
      responses:
        '201':
          description: Solicitud registrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudDTO'
        '400':
          description: Datos inválidos
        '401':
          description: No autenticado

    get:
      summary: Consultar solicitudes con filtros
      operationId: consultarSolicitud
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: estadoSolicitud
          schema:
            $ref: '#/components/schemas/EstadoSolicitud'
          description: Filtrar por estado de la solicitud
        - in: query
          name: tipoSolicitud
          schema:
            $ref: '#/components/schemas/TipoSolicitud'
          description: Filtrar por tipo de solicitud
        - in: query
          name: prioridad
          schema:
            type: string
          description: Filtrar por prioridad
        - in: query
          name: responsable
          schema:
            type: string
          description: Filtrar por ID del responsable asignado
      responses:
        '200':
          description: Lista de solicitudes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SolicitudDTO'
        '401':
          description: No autenticado

  /solicitudes/{id}:
    get:
      summary: Obtener detalle de una solicitud
      operationId: obtenerDetalle
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID de la solicitud
      responses:
        '200':
          description: Solicitud encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudDTO'
        '401':
          description: No autenticado
        '404':
          description: Solicitud no encontrada

  /solicitudes/{id}/clasificar:
    put:
      summary: Clasificar solicitud
      operationId: clasificarSolicitud
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID de la solicitud
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClasificacionDTO'
      responses:
        '200':
          description: Solicitud clasificada correctamente
        '400':
          description: Datos inválidos
        '401':
          description: No autenticado
        '404':
          description: Solicitud no encontrada
        '409':
          description: La solicitud ya fue clasificada

  /solicitudes/{id}/priorizar:
    put:
      summary: Asignar prioridad a solicitud
      operationId: asignarPrioridad
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID de la solicitud
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrioridadSolicitudDTO'
      responses:
        '200':
          description: Prioridad asignada correctamente
        '400':
          description: Datos inválidos
        '401':
          description: No autenticado
        '404':
          description: Solicitud no encontrada

  /solicitudes/{id}/responsable:
    put:
      summary: Asignar responsable a solicitud
      operationId: asignarResponsable
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID de la solicitud
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponsableDTO'
      responses:
        '200':
          description: Responsable asignado correctamente
        '401':
          description: No autenticado
        '404':
          description: Solicitud no encontrada

  /solicitudes/{id}/historial:
    get:
      summary: Consultar historial de una solicitud
      operationId: consultarHistorial
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID de la solicitud
      responses:
        '200':
          description: Historial obtenido correctamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistorialSolicitudDTO'
        '401':
          description: No autenticado
        '404':
          description: Solicitud no encontrada

  /solicitudes/{id}/cerrar:
    put:
      summary: Cerrar solicitud
      operationId: cerrarSolicitud
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID de la solicitud
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CierreDTO'
      responses:
        '200':
          description: Solicitud cerrada correctamente
        '401':
          description: No autenticado
        '404':
          description: Solicitud no encontrada
        '409':
          description: La solicitud ya está cerrada

  # ==================== FUNCIONALIDADES DE IA ====================
  /solicitudes/{id}/resumen:
    get:
      summary: Generar resumen automático de la solicitud (IA)
      operationId: generarResumenSolicitud
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID de la solicitud
      responses:
        '200':
          description: Resumen generado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumenSolicitudDTO'
        '404':
          description: Solicitud no encontrada
        '503':
          description: Servicio de IA no disponible

  /solicitudes/sugerir-clasificacion:
    post:
      summary: Sugerir clasificación automática (IA) basada en descripción
      operationId: sugerirClasificacionAutomatica
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SugerenciaClasificacionRequestDTO'
      responses:
        '200':
          description: Sugerencia generada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SugerenciaClasificacionResponseDTO'
        '503':
          description: Servicio de IA no disponible

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ==================== AUTENTICACIÓN ====================
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: Nombre de usuario o correo electrónico
        password:
          type: string
          description: Contraseña del usuario

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: Token JWT para autenticación

    # ==================== USUARIOS ====================
    UsuarioDTO:
      type: object
      properties:
        idUsuario:
          type: string
          description: Identificador único del usuario
        nombre:
          type: string
          description: Nombre completo del usuario
        correo:
          type: string
          format: email
          description: Correo electrónico del usuario
        rol:
          $ref: '#/components/schemas/Rol'
          description: Rol del usuario en el sistema
        activo:
          type: boolean
          description: Indica si el usuario está activo en el sistema
          default: true

    CrearUsuarioDTO:
      type: object
      required:
        - nombre
        - correo
        - password
        - rol
      properties:
        nombre:
          type: string
          minLength: 3
          maxLength: 100
          description: Nombre completo del usuario
        correo:
          type: string
          format: email
          description: Correo electrónico único del usuario
        password:
          type: string
          minLength: 8
          description: Contraseña (se almacenará hasheada)
        rol:
          $ref: '#/components/schemas/Rol'
        activo:
          type: boolean
          default: true
          description: Estado inicial del usuario

    ActualizarUsuarioDTO:
      type: object
      properties:
        nombre:
          type: string
          minLength: 3
          maxLength: 100
          description: Nombre completo del usuario
        correo:
          type: string
          format: email
          description: Correo electrónico del usuario
        rol:
          $ref: '#/components/schemas/Rol'
        activo:
          type: boolean
          description: Estado del usuario

    Rol:
      type: string
      enum:
        - Estudiante
        - Docente
        - Administrativo
      description: Roles disponibles en el sistema académico

    # ==================== SOLICITUDES ====================
    CrearSolicitudDTO:
      type: object
      required: [descripcion, tipoSolicitud, canalOrigen, solicitanteId]
      properties:
        descripcion:
          type: string
          description: Descripción detallada de la solicitud
        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitud'
        canalOrigen:
          type: string
          description: Canal por el que se recibió la solicitud (ej. web, email, presencial)
        solicitanteId:
          type: string
          description: ID del usuario que realiza la solicitud

    SolicitudDTO:
      type: object
      properties:
        idSolicitud:
          type: string
          description: Identificador único de la solicitud
        descripcion:
          type: string
          description: Descripción detallada de la solicitud
        fechaHoraRegistro:
          type: string
          format: date-time
          description: Fecha y hora de registro
        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitud'
        canalOrigen:
          type: string
          description: Canal de origen
        estadoSolicitud:
          $ref: '#/components/schemas/EstadoSolicitud'
        fechaLimite:
          type: string
          format: date
          description: Fecha límite para atención
        justificacionPrioridad:
          type: string
          description: Justificación de la prioridad asignada
        solicitante:
          $ref: '#/components/schemas/UsuarioDTO'
          description: Usuario que solicitó
        responsableAsignado:
          $ref: '#/components/schemas/UsuarioDTO'
          description: Usuario responsable de atender
        prioridad:
          $ref: '#/components/schemas/PrioridadSolicitudDTO'
          description: Detalles de prioridad

    ClasificacionDTO:
      type: object
      properties:
        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitud'
          description: Nuevo tipo asignado a la solicitud

    PrioridadSolicitudDTO:
      type: object
      properties:
        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitud'
          description: Tipo de solicitud (puede influir en prioridad)
        impacto:
          type: string
          description: Nivel de impacto (ej. Alto, Medio, Bajo)
        fechaLimite:
          type: string
          format: date
          description: Fecha límite que define la urgencia
        justificacion:
          type: string
          description: Razones para la prioridad asignada

    ResponsableDTO:
      type: object
      properties:
        usuarioId:
          type: string
          description: ID del usuario a asignar como responsable

    HistorialSolicitudDTO:
      type: object
      properties:
        idHistorial:
          type: string
          description: Identificador del registro histórico
        fechaHora:
          type: string
          format: date-time
          description: Momento de la acción
        accionRealizada:
          type: string
          description: Acción ejecutada (ej. clasificar, asignar, cerrar)
        observaciones:
          type: string
          description: Comentarios adicionales
        usuario:
          $ref: '#/components/schemas/UsuarioDTO'
          description: Usuario que realizó la acción

    CierreDTO:
      type: object
      properties:
        observacion:
          type: string
          description: Motivo o comentario de cierre

    TipoSolicitud:
      type: string
      enum:
        - RegistroAsignaturas
        - Homologacion
        - CancelacionAsignaturas
        - SolicitudCupos
        - ConsultaAcademica
      description: Tipos de solicitudes académicas

    EstadoSolicitud:
      type: string
      enum:
        - Registrada
        - Clasificada
        - EnAtencion
        - Atendida
        - Cerrada
      description: Estados del ciclo de vida de una solicitud

    # ==================== IA ====================
    ResumenSolicitudDTO:
      type: object
      properties:
        idSolicitud:
          type: string
          description: ID de la solicitud resumida
        resumenGenerado:
          type: string
          description: Resumen automático generado por IA
        fechaGeneracion:
          type: string
          format: date-time
          description: Momento de generación del resumen

    SugerenciaClasificacionRequestDTO:
      type: object
      required: [descripcion]
      properties:
        descripcion:
          type: string
          description: Texto de la solicitud para analizar

    SugerenciaClasificacionResponseDTO:
      type: object
      properties:
        tipoSolicitudSugerido:
          $ref: '#/components/schemas/TipoSolicitud'
          description: Tipo sugerido por IA
        prioridadSugerida:
          type: string
          description: Nivel de prioridad sugerido
        justificacionIA:
          type: string
          description: Explicación de la sugerencia